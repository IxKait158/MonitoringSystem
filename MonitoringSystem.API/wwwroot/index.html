<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonitorSys — Моніторинг мікросервісів</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">MONITOR<span>.SYS</span></div>
    <div id="connection-status">
        <div class="dot" id="dot"></div>
        <span id="status-text">Підключення...</span>
    </div>
</header>

<div id="toast"></div>

<!-- ДАШБОРД (real-time)  -->
<main>
    <div id="page-dashboard" class="page active">

        <div class="services-grid" id="services-grid">
            <div class="empty" style="padding:12px 0">Очікування даних від симулятора...</div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">⚡ Час відповіді (ms)</div>
                <canvas id="responseTimeChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">🧠 Пам'ять (MB)</div>
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

    <div class="anomalies-panel">
        <div class="panel-title">⚠ Виявлені аномалії</div>
        <div id="anomaly-list">
            <div style="color:var(--muted);font-size:12px;font-family:var(--mono)">Аномалій не виявлено</div>
        </div>
    </div>
</main>

<script src="js/chart.js"></script>
</body>
</html>
