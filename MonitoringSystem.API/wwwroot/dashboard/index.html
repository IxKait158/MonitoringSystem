<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моніторинг мікросервісів</title>
    <link href="../styles/main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>
<header>
    <div class="logo">MONITOR<span>.SYS</span></div>
    <div id="connection-status">
        <div class="dot" id="dot"></div>
        <span id="status-text">Підключення...</span>
    </div>
</header>

<main>
    <div class="services-grid" id="services-grid">
        <div style="color:var(--muted); font-size:13px; font-family:var(--mono)">Очікування даних...</div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-title">Час відповіді (ms)</div>
            <canvas id="responseTimeChart"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">Пам'ять (MB)</div>
            <canvas id="memoryChart"></canvas>
        </div>
    </div>

    <div class="anomalies-panel">
        <div class="panel-title">⚠ Виявлені аномалії</div>
        <div id="anomaly-list">
            <div style="color:var(--muted);font-size:12px;font-family:var(--mono)">Аномалій не виявлено</div>
        </div>
    </div>
</main>

<script src="../js/script.js"></script>
</body>
</html>
